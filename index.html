<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar 1 Pro Studio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a0f24; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1100px; text-align: center; }
        .panel { background: #2d1a3d; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #4a2b63; }
        
        /* Restored Drag & Drop Styling */
        #drop-zone { border: 2px dashed #4a2b63; border-radius: 12px; padding: 30px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; background: rgba(255, 255, 255, 0.03); }
        #drop-zone.highlight { border-color: #03dac6; background: rgba(3, 218, 198, 0.1); }
        
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .tool-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid #4a2b63; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; position: relative; }
        video { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; border: 2px solid #4a2b63; }
        
        button { padding: 12px 24px; font-size: 14px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; margin: 5px; transition: 0.2s; }
        .btn-primary { background: #bb86fc; color: #1a0f24; }
        .btn-record { background: #03dac6; color: #000; }
        .btn-stop { background: #cf6679; color: white; }
        
        #note-display { font-size: 36px; font-weight: bold; color: #03dac6; margin: 5px 0; }
        #tuner-meter { width: 100%; height: 12px; background: #1a0f24; border-radius: 6px; position: relative; overflow: hidden; border: 1px solid #4a2b63; }
        #tuner-needle { width: 6px; height: 100%; background: #bb86fc; position: absolute; left: 50%; transition: left 0.15s ease-out; box-shadow: 0 0 8px #bb86fc; }
        .metro-circle { width: 20px; height: 20px; background: #4a2b63; border-radius: 50%; display: inline-block; margin: 10px 0; }
        .metro-active { background: #03dac6; box-shadow: 0 0 10px #03dac6; }
        #countdown { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #03dac6; font-weight: bold; z-index: 100; display: none; }
        #upload { display: none; }
        .privacy-note { margin-top: 50px; padding: 20px; font-size: 12px; color: #888; border-top: 1px solid #2d1a3d; max-width: 600px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #bb86fc;">Guitar 1 Pro Studio</h1>

    <div class="tool-grid">
        <div class="tool-card">
            <small>Chromatic Tuner</small>
            <div id="note-display">--</div>
            <div id="tuner-meter"><div id="tuner-needle"></div></div>
            <button class="btn-primary" style="font-size:12px; margin-top:10px;" onclick="startTuner()">Enable Tuner</button>
        </div>
        <div class="tool-card">
            <small>Steady Click Metronome</small><br>
            <input type="number" id="bpm" value="100" min="40" max="220" style="width:60px; background:#1a0f24; color:white; border:1px solid #4a2b63; padding:5px; margin-top:5px;"> <small>BPM</small><br>
            <div id="metro-light" class="metro-circle"></div><br>
            <button id="metroBtn" class="btn-primary" style="font-size:12px;" onclick="toggleMetronome()">Start Metronome</button>
        </div>
    </div>

    <div class="panel">
        <div id="drop-zone">
            <p id="drop-text" style="margin: 0;"><strong>Step 1:</strong> Drag Reference Video Here or Click to Browse</p>
            <input type="file" id="upload" accept="video/*">
        </div>
        
        <button id="setupBtn" class="btn-primary">Enable Camera & Mic</button>
        <button id="startBtn" class="btn-record" style="display:none;">Start Recording</button>
        <button id="stopBtn" class="btn-stop" style="display:none;">Stop</button>
